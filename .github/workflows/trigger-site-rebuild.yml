name: Trigger Skills Site Rebuild

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_DISPATCH }}
          repository: shan8851/shan-skills
          event-type: skills-updated
